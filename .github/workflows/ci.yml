# CI/CD Pipeline - CompletePay SaaS
# Quality gates: lint (biome + ruff), type check (tsc + mypy), tests (vitest + pytest), build frontend, build Docker images.

name: CI

on:
  push:
    branches: [main, master, develop]
  pull_request:
    branches: [main, master, develop]

env:
  NODE_VERSION: "20"
  PYTHON_VERSION: "3.11"

jobs:
  # --- Backend: lint, typecheck, test ---
  backend-quality:
    name: Backend (lint, typecheck, test)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/backend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: "pip"
          cache-dependency-path: apps/backend/pyproject.toml

      - name: Install backend dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Lint (ruff)
        run: ruff check .

      - name: Type check (mypy)
        run: mypy src

      - name: Tests (pytest)
        run: pytest -v

  # --- Frontend: lint, typecheck, test, build ---
  frontend-quality:
    name: Frontend (lint, typecheck, test, build)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/frontend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"
          cache-dependency-path: apps/frontend/package-lock.json

      - name: Install frontend dependencies
        run: npm ci

      - name: Lint (biome)
        run: npm run check

      - name: Type check (tsc)
        run: npm run typecheck

      - name: Tests (vitest)
        run: npm run test:run

      - name: Build
        run: npm run build
        env:
          NEXT_PUBLIC_API_URL: https://api.example.com

  # --- Docker: build backend and frontend images ---
  docker-backend:
    name: Docker (backend)
    runs-on: ubuntu-latest
    needs: [backend-quality]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build backend image
        uses: docker/build-push-action@v6
        with:
          context: apps/backend
          file: apps/backend/docker/Dockerfile
          push: false
          load: true
          tags: completepay-backend:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max

  docker-frontend:
    name: Docker (frontend)
    runs-on: ubuntu-latest
    needs: [frontend-quality]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build frontend image
        uses: docker/build-push-action@v6
        with:
          context: apps/frontend
          file: apps/frontend/Dockerfile
          push: false
          load: true
          tags: completepay-frontend:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max
