# CI/CD Pipeline - CompletePay SaaS
# Quality gates: lint (biome + ruff), type check (tsc + mypy), tests (vitest + pytest), build frontend, build Docker images.

name: CI

on:
  push:
    branches: [main, master, develop]
  pull_request:
    branches: [main, master, develop]

env:
  NODE_VERSION: "20"
  PYTHON_VERSION: "3.11"

jobs:
  # --- Backend: lint, typecheck, test ---
  backend-quality:
    name: Backend (lint, typecheck, test)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/backend

    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: agent
          POSTGRES_PASSWORD: password
          POSTGRES_DB: completepay_agent
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432
      redis:
        image: redis:7-alpine
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 6379:6379

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: "pip"
          cache-dependency-path: apps/backend/pyproject.toml

      - name: Install backend dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Lint (ruff)
        run: ruff check .

      - name: Type check (mypy)
        run: mypy src

      - name: Tests + Coverage (pytest)
        run: pytest -v --cov=src --cov-report=xml --cov-report=term-missing
        env:
          DATABASE_URL: postgresql://agent:password@localhost:5432/completepay_agent
          REDIS_URL: redis://localhost:6379

  # --- Frontend: lint, typecheck, test, build ---
  frontend-quality:
    name: Frontend (lint, typecheck, test, build)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/frontend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"
          cache-dependency-path: apps/frontend/package-lock.json

      - name: Install frontend dependencies
        run: npm ci

      - name: Lint (biome)
        run: npm run check

      - name: Type check (tsc)
        run: npm run typecheck

      - name: Tests (vitest)
        run: npm run test:run

      - name: Build
        run: npm run build
        env:
          NEXT_PUBLIC_API_URL: https://api.example.com

  # --- Docker: build backend and frontend images ---
  docker-backend:
    name: Docker (backend)
    runs-on: ubuntu-latest
    needs: [backend-quality]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build backend image
        uses: docker/build-push-action@v6
        with:
          context: apps/backend
          file: apps/backend/docker/Dockerfile
          push: false
          load: true
          tags: completepay-backend:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max

  docker-frontend:
    name: Docker (frontend)
    runs-on: ubuntu-latest
    needs: [frontend-quality]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build frontend image
        uses: docker/build-push-action@v6
        with:
          context: apps/frontend
          file: apps/frontend/Dockerfile
          push: false
          load: true
          tags: completepay-frontend:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # --- Lighthouse CI: enforce SLOs de performance (Onda 2.2) ---
  lighthouse:
    name: Lighthouse CI (performance)
    runs-on: ubuntu-latest
    needs: [frontend-quality]
    defaults:
      run:
        working-directory: apps/frontend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"
          cache-dependency-path: apps/frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build
        env:
          SKIP_ENV_VALIDATION: "true"
          NEXT_PUBLIC_API_URL: https://api.example.com

      - name: Run Lighthouse CI
        run: npx @lhci/cli autorun

  # --- Load Test: k6 baseline (apenas na main) (Onda 4.1) ---
  load-test:
    name: Load Test (k6)
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    needs: [backend-quality]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup k6
        uses: grafana/setup-k6-action@v1

      - name: Run baseline load test
        run: k6 run tests/load/baseline.js
        env:
          BASE_URL: ${{ vars.STAGING_URL || 'http://localhost:8000' }}
          TOKEN: ${{ secrets.LOAD_TEST_TOKEN }}
